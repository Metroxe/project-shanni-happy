name: CI

# PR gate. Assembles the site exactly like deploy.yml, then runs a headless
# boot/smoke test. This is the `smoke` check required by main's branch protection.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Assemble static site from studio/ (same as deploy)
        shell: bash
        run: |
          mkdir -p _site
          cp -r studio/. _site/
          rm -rf _site/.venv _site/__pycache__ _site/refs
          rm -f _site/*.py _site/*.mjs _site/requirements.txt
          ls -la _site

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Playwright + Chromium
        # No --with-deps: that apt-installs system fonts/libs, and a slow Ubuntu
        # apt mirror has hung this step for ~10 min (PR #6). ubuntu-latest already
        # ships Chromium's required shared libs, and smoke.mjs is a headless
        # boot/no-error check that asserts nothing about font rendering — so the
        # apt step is unnecessary. The short step timeout makes any future network
        # hang (npm / browser-binary CDN) fail fast instead of eating the job budget.
        timeout-minutes: 5
        run: |
          npm install
          npx playwright install chromium

      - name: Smoke test — game boots with no errors
        run: node test/smoke.mjs _site
