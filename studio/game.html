<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
  html,body{margin:0;height:100%;background:#e9f1ea;overflow:hidden;
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;touch-action:none}
  #c{display:block;position:fixed;inset:0;width:100vw;height:100vh}
  .panel{position:fixed;background:rgba(255,255,255,.74);border:1px solid #d6c9b2;
    border-radius:11px;padding:6px 11px;color:#5a564e;font-size:14px}
  #hint{right:14px;top:12px;color:#7a756c;font-size:12px;background:rgba(255,255,255,.6)}
  #bMenu{position:fixed;right:14px;top:44px;font-size:16px;padding:4px 11px;line-height:1.2;z-index:21}
  /* journal (book) — replaces the pause menu */
  #journal{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
    background:rgba(70,64,52,.30);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
  #journal.on{display:flex}
  #book{position:relative;display:flex;align-items:stretch;perspective:2200px;
    width:min(560px,calc(100vw - 26px));height:min(560px,calc(100vh - 92px))}
  /* left binder-divider tabs */
  #tabs{display:flex;flex-direction:column;gap:10px;padding-top:28px;z-index:2}
  .jtab{position:relative;width:50px;height:58px;margin-right:-9px;border:1px solid #d6c9b2;border-right:none;
    border-radius:13px 0 0 13px;background:#ece0cd;color:#9a8f7c;font-size:23px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;box-shadow:-3px 3px 8px rgba(90,80,60,.12);
    transition:background .15s,color .15s,transform .15s;-webkit-tap-highlight-color:transparent}
  .jtab:hover{color:#7a6f5c}
  .jtab.active{background:#fffdf8;color:#c27d8b;transform:translateX(-5px);z-index:3}
  /* book body + page */
  #bookBody{position:relative;flex:1;background:#fffdf8;border:1px solid #d6c9b2;border-radius:6px 16px 16px 6px;
    box-shadow:0 14px 40px rgba(90,80,60,.30);overflow:hidden;
    background-image:linear-gradient(90deg,#efe6d4 0,#f7efe0 13px,#fffdf8 30px)}
  #pages{position:absolute;inset:0;padding:22px 24px 20px 42px;box-sizing:border-box;overflow-y:auto;
    transform-origin:left center;transform-style:preserve-3d;backface-visibility:hidden;
    transition:transform .2s ease,opacity .2s ease}
  #pages.flipping{transform:rotateY(-88deg);opacity:.25}
  .jpage[hidden]{display:none}
  .jh{font-weight:700;color:#c27d8b;font-size:20px;letter-spacing:.5px;margin:0 0 14px;
    border-bottom:2px dotted #e6dcc8;padding-bottom:9px}
  /* quests list */
  #questList{display:flex;flex-direction:column;gap:9px}
  .jempty{color:#9a948a;font-size:14px;text-align:center;margin-top:34px;line-height:1.9}
  .jempty span{font-size:12.5px;color:#b3aa9a}
  .questItem{border:1px solid #e6dcc8;border-radius:12px;background:rgba(255,255,255,.55);overflow:hidden}
  .questItem.done{opacity:.82}
  .qhead{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .qmark{color:#d39bab;font-size:12px;width:14px;text-align:center}

  .qtitle{flex:1;display:flex;flex-direction:column;line-height:1.25}
  .qname{font-weight:600;color:#5a564e;font-size:15px}
  .qgiver{font-size:11px;color:#a99e8b}
  .qchev{color:#c8b9a0;font-size:13px;transition:transform .25s}

  .qbody{max-height:0;overflow:hidden;transition:max-height .3s ease}

  .qsummary{padding:0 14px 4px 36px;font-size:12.5px;color:#7a756c;font-style:italic;line-height:1.5}
  .qcurrent{margin:6px 14px 4px 36px;padding:9px 12px;border-radius:9px;background:#f7eef0;border:1px solid #efd9df}
  .qcurlabel{font-size:10px;letter-spacing:.7px;text-transform:uppercase;color:#c490a0;font-weight:700;margin-bottom:3px}
  .qcurdesc{font-size:13.5px;color:#5a564e;line-height:1.4}
  .qprogtext{margin-top:6px;font-size:12px;color:#b76b7d;font-weight:600;font-variant-numeric:tabular-nums}
  .qbar{margin-top:5px;height:7px;border-radius:5px;background:#ece2d0;overflow:hidden}
  .qbarfill{height:100%;border-radius:5px;background:linear-gradient(90deg,#e6b9c6,#d99bb0);transition:width .35s ease}
  .qdoneline{margin:4px 14px 2px 36px;font-size:13px;color:#7aa37e;font-weight:600}
  .qsteps{display:flex;flex-direction:column;gap:4px;padding:8px 14px 13px 36px}
  .qstep{display:flex;gap:8px;align-items:baseline;font-size:13px;line-height:1.4}
  .qbox{width:14px;text-align:center;font-size:12px;flex:none}
  .qstep.done .qbox{color:#8fb592}.qstep.done .qsteptext{color:#a59d8e;text-decoration:line-through}
  .qstep.active .qbox{color:#c27d8b}.qstep.active .qsteptext{color:#5a564e;font-weight:600}
  .qstep.future{opacity:.6}.qstep.future .qbox{color:#c8bca6}
  /* settings page (sliders reused from the old pause menu) */
  .srow{display:flex;align-items:center;gap:11px;margin:13px 0;font-size:14px}
  .srow>span:first-child{width:52px;color:#7a756c}
  .sval{width:40px;text-align:right;color:#b76b7d;font-variant-numeric:tabular-nums}
  #journal input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:4px;
    background:#ece2d0;outline:none;cursor:pointer}
  #journal input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:#e6b9c6;border:2px solid #fffdf8;box-shadow:0 1px 4px rgba(90,80,60,.3);cursor:pointer}
  #journal input[type=range]::-moz-range-thumb{width:18px;height:18px;border:2px solid #fffdf8;border-radius:50%;
    background:#e6b9c6;box-shadow:0 1px 4px rgba(90,80,60,.3);cursor:pointer}
  .mrow{display:flex;justify-content:space-between;align-items:center;width:100%;box-sizing:border-box;
    margin:14px 0 2px;padding:10px 13px;border:1px solid #e0d4bf;border-radius:11px;
    background:rgba(255,255,255,.6);color:#6a655c;font:inherit;font-size:14px;cursor:pointer}
  .mrow #muteState{font-weight:700;color:#7aa37e}

  /* loading screen — pure CSS papercraft flower, no assets to wait on */
  #loader{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;

  .shen{position:absolute;left:50%;bottom:40px;height:122px;width:auto;margin-left:-28px;

  .lshadow{position:absolute;left:50%;bottom:34px;width:58px;height:14px;margin-left:-29px;border-radius:50%;

  .spark.s2{right:34px;top:40px;color:#bcd9c4;background:#bcd9c4;animation-delay:.08s}
  .spark.s3{left:70px;top:24px;color:#d7c3e0;background:#d7c3e0;animation-delay:.04s}
  #loadText{margin-top:2px;color:#c27d8b;font-weight:600;font-size:16px;letter-spacing:.4px}
  #loadText::after{content:'';animation:dots 1.5s steps(1,end) infinite}
  #loader.err #loadStage{animation:none;opacity:.5}
  @keyframes hop{
    0%  {transform:translateY(0)     scaleX(1.1)  scaleY(.9)  rotate(0deg)}
    14% {transform:translateY(-10px) scaleX(.93)  scaleY(1.1) rotate(-2deg)}
    40% {transform:translateY(-58px) scaleX(1)    scaleY(1)   rotate(5deg)}
    50% {transform:translateY(-62px) scaleX(1)    scaleY(1)   rotate(-4deg)}
    60% {transform:translateY(-58px) scaleX(1)    scaleY(1)   rotate(5deg)}
    86% {transform:translateY(-10px) scaleX(.96)  scaleY(1.05) rotate(2deg)}
    100%{transform:translateY(0)     scaleX(1.1)  scaleY(.9)  rotate(0deg)}}
  @keyframes lshadow{0%,100%{transform:scaleX(1) scaleY(1);opacity:.55}
    50%{transform:scaleX(.46) scaleY(.46);opacity:.22}}
  @keyframes twinkle{0%,34%{opacity:0;transform:scale(.4)}
    50%{opacity:.95;transform:scale(1)}66%,100%{opacity:0;transform:scale(.4)}}
  @keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
  /* title / continue screen */
  #title{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 50% 30%,rgba(233,241,234,.55),rgba(233,241,234,.9));
    opacity:1;transition:opacity .5s}
  #title.off{opacity:0;pointer-events:none}
  #title .card{display:flex;flex-direction:column;align-items:center;gap:4px;
    background:rgba(255,253,248,.96);border:1px solid #d6c9b2;border-radius:22px;
    padding:30px 40px 26px;box-shadow:0 10px 36px rgba(90,80,60,.18);text-align:center;
    min-width:min(330px,calc(100vw - 48px))}
  #title .mark{font-size:40px;color:#c27d8b;line-height:1}
  #title h1{margin:6px 0 0;font-size:26px;font-weight:700;color:#5a564e;letter-spacing:.4px}
  #title .sub{margin:2px 0 18px;font-size:13px;color:#9a948a}
  #title .menu{display:flex;flex-direction:column;gap:9px;width:100%}
  .tbtn{font:inherit;font-size:16px;border-radius:13px;border:1px solid #d6c9b2;
    background:rgba(255,255,255,.85);color:#5a564e;padding:12px 22px;cursor:pointer;
    user-select:none;touch-action:none;transition:.12s}
  .tbtn:active{transform:scale(.97)}
  .tbtn.primary{background:#f6e7ea;border-color:#e6b9c6;color:#b76b7d;font-weight:600}
  .tbtn.sel{box-shadow:0 0 0 2px #e6b9c6,0 4px 12px rgba(183,107,125,.18)}
  .tbtn.danger{background:#f7e3e3;border-color:#e6b9b9;color:#b76b6b}
  .tbtn[hidden]{display:none}
  #buildTag{margin-top:14px;font-size:11px;color:#bcb4a6;letter-spacing:.3px}
</style>

<script type="module">
import * as THREE from 'three';
import { WORLD, initState, step, setBounds, setColliders } from './js/sim.js';
import { Dialogue } from './js/dialogue.js';
import * as Save from './js/save.js';
import { Sound } from './js/audio.js';
import { Quests } from './js/quests.js';
import { FX } from './js/fx.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(40,1,0.1,300);

const SHEN_H=1.9, SHEN_W=SHEN_H*0.4634, GROUND_EPS=0.02;
const WALK_HOP=0.24, MAX_LIFT=1.5, FH=0.95, PLAYER_R=0.42;
const TALK_R=2.4; const _tv=new THREE.Vector3();

const loader=new THREE.TextureLoader();
const tx=u=>new Promise(res=>loader.load(u,t=>{t.colorSpace=THREE.SRGBColorSpace;t.anisotropy=4;
  t.minFilter=THREE.LinearMipmapLinearFilter;t.magFilter=THREE.LinearFilter;res(t);}));
const hex=h=>new THREE.Color('#'+h);

function billboard(tex,w,h,opts={}){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),
    new THREE.MeshBasicMaterial({map:tex,transparent:opts.soft?true:false,
      alphaTest:opts.soft?0:0.5,depthWrite:opts.soft?false:true,
      opacity:opts.opacity??1, color:opts.tint?new THREE.Color(opts.tint):0xffffff}));
  return m;
}
function softCanvasTex(draw){const s=128,c=document.createElement('canvas');c.width=s;c.height=s;
  draw(c.getContext('2d'),s);return new THREE.CanvasTexture(c);}

// shadow + cloud + hill canvas textures
const shadowTex=softCanvasTex((x,s)=>{const g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(60,52,40,.5)');g.addColorStop(.6,'rgba(60,52,40,.2)');g.addColorStop(1,'rgba(60,52,40,0)');
  x.fillStyle=g;x.fillRect(0,0,s,s);});
function blobTex(col){return softCanvasTex((x,s)=>{x.fillStyle=col;
  [[.5,.55,.34],[.32,.6,.24],[.68,.6,.24],[.42,.42,.2],[.6,.42,.2]].forEach(([a,b,r])=>{
    x.beginPath();x.ellipse(a*s,b*s,r*s,r*s*.8,0,0,7);x.fill();});});}

let world, S, shen, mesh=null, shadow, pickups=[], propsMesh=[], burst, burstT=-1, burstPos=new THREE.Vector3();
let npcs=[], nearNpc=null, talkCooldown=0;
let started=false, BUILD='dev';

const clamp=(x,a,b)=>Math.min(b,Math.max(a,x));
const smooth=t=>t<=0?0:t>=1?1:t*t*(3-2*t);
const ease=(a,b,t)=>a+(b-a)*smooth(t);
// framerate-independent exponential smoothing toward a target (tau in seconds).
const damp=(cur,tgt,tau,dt)=>tgt+(cur-tgt)*Math.exp(-dt/Math.max(tau,1e-4));
// smoothed display pose: tweens between animation states so rapid direction
// flips / start-stop / mode changes ease instead of snapping. Height stays
// crisp (jumps feel responsive); lean & squash ease a touch more.
const D={yW:0,sx:1,sy:1,rot:0}; let Dinit=false;
function pose(s){
  if(s.mode==='air'){const sy=1+clamp(s.vy*0.022,-0.12,0.2);return{yW:s.y,sx:1/Math.sqrt(Math.max(sy,.4)),sy,rot:0};}

    persist();}
  if(burstT>=0){burstT+=dt;const p=burstT/0.45;burst.visible=p<1;burst.position.copy(burstPos);burst.quaternion.copy(cam.quaternion);
    const sc=0.6+p*2.4;burst.scale.set(sc,sc,1);burst.material.opacity=(1-p)*0.8;if(p>=1)burstT=-1;}
  // NPCs: gentle paper breathing + greet hop
  npcs.forEach(o=>{
    const t=S.animClock+o.phase;
    let sy=1+0.02*Math.sin(t*2.0), yW=0;
    if(o.greet>0){o.greet=Math.max(0,o.greet-dt);const p=1-o.greet/0.5;
      yW=Math.sin(p*Math.PI)*0.5; sy=1+0.06*Math.sin(p*Math.PI);}
    faceYaw(o.group);
    o.group.scale.set(1/Math.sqrt(sy),sy,1);
    o.group.rotation.z=0.012*Math.sin(t*1.3);
    o.mesh.position.y=o.h/2+yW;
  });
  billboards.forEach(faceYaw);   // pickups + NPCs yaw to the rotating camera

  // proximity → nearest talkable NPC + floating prompt
  nearNpc=null;
  if(!Dialogue.active && talkCooldown<=0){let best=1e9;
    npcs.forEach(o=>{const dx=o.data.x-S.x,dz=o.data.z-S.z,d=dx*dx+dz*dz;
      if(d<TALK_R*TALK_R&&d<best){best=d;nearNpc=o;}});}
  const tp=document.getElementById('talkPrompt');
  if(nearNpc){cam.updateMatrixWorld();
    _tv.set(nearNpc.data.x,nearNpc.h+0.5,nearNpc.data.z).project(cam);
    tp.style.left=((_tv.x*0.5+0.5)*innerWidth)+'px';
    tp.style.top=((-_tv.y*0.5+0.5)*innerHeight)+'px';
    tp.textContent='💬 Talk to '+nearNpc.data.name;
    tp.classList.add('on');
  } else tp.classList.remove('on');
  // the Talk action button only appears when you're beside someone to talk to
  const talkable=!!nearNpc||Dialogue.active, bTalk=document.getElementById('bTalk');
  bTalk.hidden=!talkable; bTalk.classList.toggle('near',talkable);

  FX.render();
}

// ---------- audio: map sim-state transitions to one-shot SFX ----------
const aprev={onGround:true,mode:'idle',walkSeg:0};
function audioStep(s){
  if(s.justGot>=0)Sound.sfx('squeak');                       // picked up a hamster
  if(aprev.onGround&&!s.onGround)Sound.sfx('hop');           // jump launch
  if(!aprev.onGround&&s.onGround)Sound.sfx('land');          // touchdown
  const seg=Math.floor(s.walkPhase/Math.PI);                 // walk contact = each half-cycle
  if(s.mode==='walk'&&seg!==aprev.walkSeg)Sound.sfx('step');
  aprev.onGround=s.onGround; aprev.mode=s.mode; aprev.walkSeg=seg;
}

// ---------- input (human + AI share one path) ----------
const held={up:false,down:false,left:false,right:false}; let edgeJump=false,edgeTalk=false;
let aiMove=null, aiTarget=null, aiJump=false;
addEventListener('keydown',e=>{const k=e.key.toLowerCase();
  if(!started)return;                        // title screen owns input until play begins
  Sound.resume();                            // browsers gate audio behind a gesture
  if(k==='escape'&&!e.repeat){e.preventDefault();toggleJournal();return;}
  if(k==='m'&&!e.repeat){Sound.toggle();syncMenu();return;}
  if(journalOpen())return;                   // open journal eats other keys
  if(Dialogue.active){                       // dialogue captures all input
    if(k==='arrowup'||k==='w')Dialogue.move(-1);
    else if(k==='arrowdown'||k==='s')Dialogue.move(1);
    else if(k===' '||k==='enter'||k==='e')Dialogue.advance();
    if(['arrowup','arrowdown','arrowleft','arrowright',' ','enter'].includes(k))e.preventDefault();
    return;
  }
  if(k==='arrowup'||k==='w')held.up=true; else if(k==='arrowdown'||k==='s')held.down=true;
  else if(k==='arrowleft'||k==='a')held.left=true; else if(k==='arrowright'||k==='d')held.right=true;
  else if((k===' ')&&!e.repeat)edgeJump=true;
  else if((k==='e'||k==='enter')&&!e.repeat)edgeTalk=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k))e.preventDefault();});
addEventListener('keyup',e=>{const k=e.key.toLowerCase();
  if(k==='arrowup'||k==='w')held.up=false; else if(k==='arrowdown'||k==='s')held.down=false;
  else if(k==='arrowleft'||k==='a')held.left=false; else if(k==='arrowright'||k==='d')held.right=false;});
// resume audio on the first touch/click too (mobile has no keydown)
addEventListener('pointerdown',()=>Sound.resume(),{passive:true});

// ---------- journal (book: Quests + Settings tabs, page-flip) ----------
const journal=document.getElementById('journal'), pagesEl=document.getElementById('pages');
const vol=document.getElementById('vol'), sfxvol=document.getElementById('sfxvol'),
  musicvol=document.getElementById('musicvol'), muteRow=document.getElementById('muteRow');
const journalOpen=()=>journal.classList.contains('on');
let curTab='quests', listDirty=true;

// --- settings sliders (same behaviour as the old pause menu, relocated) ---
function paintSlider(el){const v=+el.value; el.style.background=`linear-gradient(90deg,#e6b9c6 ${v}%,#ece2d0 ${v}%)`;}
function setSlider(el,valId,frac){const v=Math.round(frac*100);
  el.value=v; document.getElementById(valId).textContent=v+'%'; paintSlider(el);}
function syncMenu(){
  setSlider(vol,'volVal',Sound.volume);
  setSlider(sfxvol,'sfxVal',Sound.sfxVolume);
  setSlider(musicvol,'musicVal',Sound.musicVolume);
  document.getElementById('muteState').textContent=Sound.muted?'off':'on';
  muteRow.classList.toggle('off',Sound.muted);}

// --- quest page rendering (from Quests.list()) ---
function mk(tag,cls,txt){const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e;}
function renderQuests(){
  const list=Quests.list();
  document.getElementById('questEmpty').style.display=list.length?'none':'block';
  const wrap=document.getElementById('questList'); wrap.innerHTML='';
  list.forEach((q,qi)=>{
    const item=mk('div','questItem'+(q.status==='done'?' done':''));
    const head=mk('div','qhead');
    head.appendChild(mk('span','qmark',q.status==='done'?'✓':'◆'));
    const title=mk('span','qtitle'); title.appendChild(mk('span','qname',q.name));
    if(q.giver)title.appendChild(mk('span','qgiver',q.giver));
    head.appendChild(title); head.appendChild(mk('span','qchev','▾'));
    const body=mk('div','qbody');
    if(q.summary)body.appendChild(mk('div','qsummary',q.summary));
    if(q.current){
      const cur=mk('div','qcurrent');
      cur.appendChild(mk('div','qcurlabel','Current task'));
      cur.appendChild(mk('div','qcurdesc',q.current.desc));
      if(q.current.prog){const p=q.current.prog,pct=Math.round(100*p.have/Math.max(1,p.need));
        cur.appendChild(mk('div','qprogtext',p.have+' / '+p.need));
        const bar=mk('div','qbar'),fill=mk('div','qbarfill'); fill.style.width=pct+'%'; bar.appendChild(fill); cur.appendChild(bar);}
      body.appendChild(cur);
    } else if(q.status==='done') body.appendChild(mk('div','qdoneline','Completed ✓'));
    const steps=mk('div','qsteps');
    q.steps.forEach(s=>{const row=mk('div','qstep'+(s.done?' done':s.active?' active':' future'));
      row.appendChild(mk('span','qbox',s.done?'✓':s.active?'◆':'○'));
      let t=s.desc; if(s.prog)t+=' ('+s.prog.have+'/'+s.prog.need+')';
      row.appendChild(mk('span','qsteptext',t)); steps.appendChild(row);});
    body.appendChild(steps);
    head.addEventListener('click',()=>{item.classList.toggle('open'); Sound.sfx('move');});
    item.appendChild(head); item.appendChild(body);
    if(qi===0&&q.status==='active')item.classList.add('open');   // first active quest open by default
    wrap.appendChild(item);
  });
}

// --- tabs / page-flip ---
function setActiveTab(name){document.querySelectorAll('.jtab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));}
function showPage(name){
  document.getElementById('page-quests').hidden=name!=='quests';
  document.getElementById('page-settings').hidden=name!=='settings';
  if(name==='quests'&&listDirty){renderQuests(); listDirty=false;}
  if(name==='settings')syncMenu();
}
function switchTab(name){
  if(name===curTab)return; curTab=name; setActiveTab(name); Sound.sfx('flip');
  pagesEl.classList.add('flipping');                              // turn the page edge-on...
  setTimeout(()=>{showPage(name); pagesEl.classList.remove('flipping');},200);   // ...swap, turn back
}
document.querySelectorAll('.jtab').forEach(t=>t.addEventListener('click',e=>{e.preventDefault();Sound.resume();switchTab(t.dataset.tab);}));

function openJournal(tab){Sound.resume(); playing=false; held.up=held.down=held.left=held.right=false;
  const name=tab||curTab||'quests'; curTab=name; setActiveTab(name);
  pagesEl.classList.remove('flipping'); listDirty=true; showPage(name);
  document.getElementById('bMenu').classList.remove('badge');
  journal.classList.add('on'); Sound.sfx('book');}
function closeJournal(){journal.classList.remove('on'); edgeJump=edgeTalk=false; last=null; playing=true; Sound.sfx('bookClose');}
function toggleJournal(){Sound.resume(); journalOpen()?closeJournal():openJournal();}

// --- quest toast (milestones + hamster count) ---
let toastT=null;
function toast(msg){const t=document.getElementById('qtoast'); t.textContent=msg; t.classList.add('on');
  if(toastT)clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'),2200);}
function questEvent(msg,sfx){toast(msg); Sound.sfx(sfx); listDirty=true;
  if(journalOpen())renderQuests(); else document.getElementById('bMenu').classList.add('badge');}

// pick a state-aware dialogue entry node for an NPC tied to a quest
function entryNode(npc){
  const qid=npc.quest; if(!qid||!Quests.defs[qid])return undefined;     // no quest → tree default
  const N=npc.dialogue.nodes, status=Quests.status(qid);
  if(status==='unstarted')return undefined;                            // intro / offer
  if(status==='done')return N.done?'done':undefined;
  const g=Quests.currentGoal(qid);                                     // active
  if(g&&g.type==='talk'&&g.npc===npc.name)return N.ready?'ready':undefined;   // returning to the giver
  return N.progress?'progress':undefined;                             // still working on it
}

// settings listeners
vol.addEventListener('input',()=>{Sound.resume();Sound.setVolume(+vol.value/100);syncMenu();});
vol.addEventListener('change',()=>Sound.sfx('select'));      // preview overall level on release
sfxvol.addEventListener('input',()=>{Sound.resume();Sound.setSfxVolume(+sfxvol.value/100);syncMenu();});
sfxvol.addEventListener('change',()=>Sound.sfx('select'));   // preview the SFX level on release
musicvol.addEventListener('input',()=>{Sound.resume();Sound.setMusicVolume(+musicvol.value/100);syncMenu();});
muteRow.addEventListener('click',e=>{e.preventDefault();Sound.resume();Sound.toggle();syncMenu();});
document.getElementById('resumeBtn').addEventListener('click',e=>{e.preventDefault();closeJournal();});
document.getElementById('restartBtn').addEventListener('click',e=>{e.preventDefault();Save.wipe();S=initState(world.collectibles);
  Quests.init(world.quests,null,Quests.ctx); listDirty=true; renderQuests(); persist(); Sound.sfx('move'); closeJournal();});
document.getElementById('bMenu').addEventListener('click',e=>{e.preventDefault();toggleJournal();});
journal.addEventListener('pointerdown',e=>{if(e.target===journal)closeJournal();}); // backdrop closes
syncMenu();
function holdBtn(id,set){const b=document.getElementById(id);
  b.addEventListener('pointerdown',e=>{e.preventDefault();set(true);});
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>b.addEventListener(ev,()=>set(false)));}
// up/down double as choice navigation while talking
function navBtn(id,dir,set){const b=document.getElementById(id);
  b.addEventListener('pointerdown',e=>{e.preventDefault(); if(Dialogue.active)Dialogue.move(dir); else set(true);});
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>b.addEventListener(ev,()=>set(false)));}
navBtn('bU',-1,v=>held.up=v); navBtn('bD',1,v=>held.down=v);
holdBtn('bL',v=>held.left=v);holdBtn('bR',v=>held.right=v);
document.getElementById('bHop').addEventListener('click',()=>{if(!Dialogue.active)edgeJump=true;});
document.getElementById('bTalk').addEventListener('click',()=>{
  if(Dialogue.active)Dialogue.advance(); else edgeTalk=true;});
function resolveInput(){
  if(!started||Dialogue.active) return {moveX:0,moveZ:0,jump:false};
  // camera-relative: UP = into the screen (where the camera looks), LEFT/RIGHT = screen-relative
  const fwd=(held.up?1:0)-(held.down?1:0), stf=(held.right?1:0)-(held.left?1:0);
  let mx=0,mz=0;
  if(fwd||stf){const b=camBasis();mx=b.fx*fwd+b.rx*stf;mz=b.fz*fwd+b.rz*stf;const mm=Math.hypot(mx,mz);if(mm>1){mx/=mm;mz/=mm;}}
  else if(aiMove){mx=aiMove.x;mz=aiMove.z;}
  else if(aiTarget){const dx=aiTarget.x-S.x,dz=aiTarget.z-S.z,d=Math.hypot(dx,dz);
    if(d<0.18)aiTarget=null; else{mx=dx/d;mz=dz/d;}}
  const jump=edgeJump||aiJump; edgeJump=false;aiJump=false;
  return {moveX:mx,moveZ:mz,jump};}

// ---------- loop: fixed-timestep accumulator ----------
const FIXED=1/60; let playing=true,timer=null,last=null,acc=0;
function frame(){const now=performance.now();if(last===null)last=now;
  let e=(now-last)/1000;last=now; if(e>0.5)e=0.5;
  if(started&&edgeTalk){edgeTalk=false; if(playing&&!Dialogue.active&&nearNpc){const npc=nearNpc.data;
    nearNpc.greet=0.5; Sound.sfx('talk'); Dialogue.start(npc, entryNode(npc));   // entry node BEFORE noting
    if(npc.name)Quests.note({type:'talk',npc:npc.name});}}
  if(playing){acc+=e;let n=0;while(acc>=FIXED&&n<40){S=step(S,resolveInput(),FIXED);audioStep(S);acc-=FIXED;n++;}}
  draw(e);}
function startAuto(){if(!timer){last=null;acc=0;timer=setInterval(frame,16);}}
window.__stopAuto=()=>{if(timer){clearInterval(timer);timer=null;}};
window.__startAuto=startAuto;

// ---------- title / continue screen + autosave ----------
const titleEl=document.getElementById('title');
const btnContinue=document.getElementById('btnContinue');
const btnNew=document.getElementById('btnNew');
let titleBtns=[], titleSel=0, confirmNew=false, hasSaved=false;
function setupTitle(saveExists){
  hasSaved=saveExists;
  document.getElementById('buildTag').textContent='build '+BUILD;
  if(saveExists){btnContinue.hidden=false;btnContinue.classList.add('primary');btnNew.classList.remove('primary');}
  else{btnContinue.hidden=true;btnNew.classList.add('primary');}
  titleBtns=saveExists?[btnContinue,btnNew]:[btnNew];
  titleSel=0; renderTitleSel();
  btnContinue.onclick=()=>beginGame(false);
  btnNew.onclick=()=>onNew();
}
function renderTitleSel(){titleBtns.forEach((b,i)=>b.classList.toggle('sel',i===titleSel));}
function titleMove(d){if(!titleBtns.length)return;titleSel=(titleSel+d+titleBtns.length)%titleBtns.length;renderTitleSel();}
function titleConfirm(){const b=titleBtns[titleSel]; if(b===btnContinue)beginGame(false); else onNew();}
function onNew(){
  if(hasSaved&&!confirmNew){               // one guard click before erasing real progress
    confirmNew=true; btnNew.textContent='Erase save?'; btnNew.classList.add('danger');
    titleSel=titleBtns.indexOf(btnNew); renderTitleSel(); return;
  }
  beginGame(true);
}
function beginGame(fresh){
  Sound.resume();                           // first gesture — unlock audio
  // Auto-loop the ambient track only on a real deploy (build.json present → BUILD
  // is a git sha). In a local dev worktree (no build.json → BUILD==='dev') it's
  // armed but silent; the music slider still starts it if you want it.
  Sound.startMusic('out/music/calm.ogg', BUILD!=='dev');
  if(fresh){Save.wipe(); S=initState(world.collectibles);
    Quests.init(world.quests,null,Quests.ctx); listDirty=true;}   // New Game resets quests too
  started=true; titleEl.classList.add('off');
  persist();                                // stamp a save the moment play begins
}
addEventListener('keydown',e=>{
  if(started)return;                        // only steer the menu before play
  const k=e.key.toLowerCase();
  if(k==='arrowup'||k==='w'){titleMove(-1);e.preventDefault();}
  else if(k==='arrowdown'||k==='s'){titleMove(1);e.preventDefault();}
  else if(k===' '||k==='enter'){titleConfirm();e.preventDefault();}
});

// autosave: on hide / pagehide (true "exit any time") + a 10s crash backstop.
function persist(){if(!started)return;try{Save.write(S,world,BUILD,{quests:Quests.serialize()});}catch{}}
addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')persist();});
addEventListener('pagehide',persist);
setInterval(persist,10000);

function resize(){const w=innerWidth||1280,h=innerHeight||800;renderer.setSize(w,h,false);
  cam.aspect=w/h;cam.updateProjectionMatrix();FX.setSize(w,h);}
addEventListener('resize',resize);

// ---------- AI / debug control surface ----------
window.game={
  state:()=>({x:+S.x.toFixed(2),z:+S.z.toFixed(2),y:+S.y.toFixed(2),mode:S.mode,
    onGround:S.onGround,target:aiTarget,
    collectibles:S.collectibles.map(c=>({x:c.x,z:c.z,got:c.got})),world:WORLD}),
  goTo:(x,z)=>{aiTarget={x:+x,z:+z};return 'goTo '+x+','+z;},
  setMove:(x,z)=>{aiMove={x:Math.sign(x||0),z:Math.sign(z||0)};return 'move';},
  stop:()=>{aiTarget=null;aiMove=null;return 'stop';},
  jump:()=>{aiJump=true;return 'jump';},
  talk:()=>{ if(Dialogue.active){Dialogue.advance();return 'advance';} edgeTalk=true; return 'talk'; },
  dialogue:()=>({active:Dialogue.active,near:nearNpc&&nearNpc.data.name||null}),
  disp:()=>({yW:+D.yW.toFixed(3),sx:+D.sx.toFixed(3),sy:+D.sy.toFixed(3),rot:+D.rot.toFixed(4)}),
  reset:()=>{Save.wipe();S=initState(world.collectibles);return 'reset';},
  pause:()=>{playing=false;return 'paused';},play:()=>{playing=true;return 'playing';},
  start:(fresh)=>{beginGame(!!fresh);return started?'started':'no';},
  save:()=>{persist();return 'saved';},
  wipe:()=>{Save.wipe();return 'wiped';},
  saveData:()=>Save.load(world),
  // quests + journal debug surface
  quests:()=>Quests.list(),
  startQuest:(id)=>Quests.start(id)?('started '+id):'no',
  noteTalk:(npc)=>Quests.note({type:'talk',npc}),
  journal:(tab)=>{if(journalOpen())closeJournal();else openJournal(tab);return journalOpen()?('open:'+curTab):'closed';},
  tab:(name)=>{if(!journalOpen())openJournal(name);else switchTab(name);return curTab;},
  // audio debug surface
  audio:()=>({ready:Sound.ready,muted:Sound.muted,volume:Sound.volume,effects:Sound.sfxVolume,
    music:Sound.musicVolume,musicOn:Sound.musicOn,musicPlaying:Sound.musicPlaying}),
  sfx:(n)=>{Sound.resume();return Sound.sfx(n)||('sfx '+n);},
  effects:(v)=>{Sound.resume();return Sound.setSfxVolume(+v);},
  music:(v)=>{Sound.resume();return v===undefined?Sound.toggleMusic():Sound.setMusicVolume(+v);},
  say:(t='Hello there, friend!',who='Chrees')=>{Sound.resume();Sound.newLine();
    [...String(t)].forEach((c,i)=>setTimeout(()=>Sound.blip(c,who),i*60));return 'say';},
};
window.audio=Sound;
build().catch(e=>{window.__err=String(e&&e.stack||e);console.error(e);
  const ld=document.getElementById('loader'); if(ld){ld.classList.add('err');
    const t=document.getElementById('loadText'); if(t)t.textContent='couldn’t load ✗';}});
</script></body></html>
