<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body{margin:0;height:100%;background:#e9f1ea;overflow:hidden;
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#5a564e}
  #c{display:block;position:fixed;inset:0;width:100vw;height:100vh}
  .lab{position:fixed;top:7%;text-align:center;font-size:14px;width:33%;pointer-events:none}
  .lab b{display:block;font-size:15px}
  .lab small{color:#8a857c;font-size:11.5px}
  #l0{left:0}#l0 b{color:#7aa37f}
  #l1{left:33%}#l1 b{color:#9a7bb0}
  #l2{left:66%}#l2 b{color:#c27d8b}
  #cap{position:fixed;left:0;right:0;bottom:10px;text-align:center;font-size:12px;color:#8a857c}
</style>
<script type="importmap">{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
</head><body>
<canvas id="c"></canvas>
<div class="lab" id="l0"><b>1 · Procedural paper</b><small>coded primitives</small></div>
<div class="lab" id="l1"><b>3 · TripoSR — same house</b><small>image→mesh from the flat sprite</small></div>
<div class="lab" id="l2"><b>3 · TripoSR — Shen chibi</b><small>bonus: image→mesh of the character</small></div>
<div id="cap">image-to-3D (TripoSR) on the system76 box · turntable · __render(deg) freezes an angle</div>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#e9f1ea');

const RW=1440, RH=810, HALFW=8.6;
const cam=new THREE.OrthographicCamera(-HALFW,HALFW,HALFW*RH/RW,-HALFW*RH/RW,0.1,100);
cam.position.set(7.2,8.4,12); cam.lookAt(0,1.0,0);

scene.add(new THREE.HemisphereLight(0xffffff,0xdfe7d6,2.3));
const sun=new THREE.DirectionalLight(0xfff6ea,2.1);
sun.position.set(6,11,7); sun.castShadow=true; sun.shadow.mapSize.set(1024,1024);
const sc=sun.shadow.camera; sc.left=-12;sc.right=12;sc.top=12;sc.bottom=-12;sc.near=1;sc.far=40;
scene.add(sun);

const ground=new THREE.Mesh(new THREE.PlaneGeometry(60,60),
  new THREE.MeshLambertMaterial({color:'#cfe1c2'}));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

const paper=hex=>new THREE.MeshLambertMaterial({color:new THREE.Color(hex),flatShading:true,
  emissive:new THREE.Color(hex),emissiveIntensity:0.06});
function pHouse(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.35,1.05,1.15),
    new THREE.MeshLambertMaterial({color:'#f3e7d2'})); body.position.y=0.53; g.add(body);
  const roof=new THREE.Mesh(new THREE.ConeGeometry(1.08,0.82,4),paper('#e4b3c1'));
  roof.position.y=1.46; roof.rotation.y=Math.PI/4; g.add(roof);
  const door=new THREE.Mesh(new THREE.BoxGeometry(0.34,0.56,0.08),
    new THREE.MeshLambertMaterial({color:'#b98aa6'})); door.position.set(0,0.3,0.6); g.add(door);
  g.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}}); return g;
}

function shadowDisc(r){
  const s=128,cv=document.createElement('canvas');cv.width=s;cv.height=s;
  const x=cv.getContext('2d');const gr=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  gr.addColorStop(0,'rgba(60,52,40,.32)');gr.addColorStop(.6,'rgba(60,52,40,.13)');gr.addColorStop(1,'rgba(60,52,40,0)');
  x.fillStyle=gr;x.fillRect(0,0,s,s);
  const m=new THREE.Mesh(new THREE.PlaneGeometry(r,r),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthWrite:false}));
  m.rotation.x=-Math.PI/2;m.position.y=0.02;return m;
}

const turntables=[];
function place(node,x,shadowR){
  const tt=new THREE.Group(); tt.position.set(x,0,0); tt.add(node); scene.add(tt);
  const sh=shadowDisc(shadowR); sh.position.set(x,0.02,0); scene.add(sh);
  turntables.push(tt); return tt;
}

const gltf=new GLTFLoader();
function load(url){return new Promise((res,rej)=>gltf.load(url,g=>res(g.scene),undefined,rej));}
// center on x/z, sit base on ground, scale to target height; report raw size for orientation checks
function fit(obj,targetH){
  obj.updateMatrixWorld(true);
  const box=new THREE.Box3().setFromObject(obj);
  const size=new THREE.Vector3();box.getSize(size);
  const s=targetH/size.y; obj.scale.setScalar(s);
  obj.updateMatrixWorld(true);
  const b2=new THREE.Box3().setFromObject(obj);const c=new THREE.Vector3();b2.getCenter(c);
  obj.position.set(-c.x,-b2.min.y,-c.z);
  obj.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;
    if(o.material){o.material.metalness=0;o.material.roughness=1;o.material.side=THREE.DoubleSide;}}});
  return {raw:[+size.x.toFixed(2),+size.y.toFixed(2),+size.z.toFixed(2)]};
}

window.__meta={};
async function build(){
  place(pHouse(),-4.5,2.4);
  const house=await load('out/3d/house-triposr.glb'); window.__meta.house=fit(house,1.8); place(house,0,2.4);
  const shen=await load('out/3d/shen-triposr.glb'); window.__meta.shen=fit(shen,2.7); place(shen,4.5,2.0);
  window.__ready=true; renderer.setSize(RW,RH,false); render(26);
}

function render(d){for(const tt of turntables)tt.rotation.y=d*Math.PI/180;renderer.render(scene,cam);}
window.__render=d=>render(d);
let timer=null,t0=null;
function tick(){const now=performance.now();if(t0===null)t0=now;render((now-t0)/1000*24%360);}
window.__stopAuto=()=>{if(timer){clearInterval(timer);timer=null;}};
window.__startAuto=()=>{if(!timer){t0=null;tick();timer=setInterval(tick,33);}};

build().then(()=>window.__startAuto()).catch(e=>{window.__err=String(e&&e.stack||e);console.error(e);});
</script></body></html>
